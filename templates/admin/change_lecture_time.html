<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Lecture Time</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                        <h4 class="text-center mb-0">Change Lecture Time</h4>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST" action="{{ url_for('admin.change_lecture_time') }}">
                            <div class="mb-3">
                                <label for="subject_id" class="form-label">Select Subject</label>
                                <select class="form-select" id="subject_id" name="subject_id" required>
                                    <option value="" disabled selected>-- Choose a Subject --</option>
                                    {% for subject in subjects %}
                                    <option value="{{ subject.id }}">
                                        Semester {{ subject.semester }} - {{ subject.name }} ({{ subject.code }})
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="start_time" class="form-label">New Start Time</label>
                                <input type="time" class="form-control" id="start_time" name="start_time" required>
                            </div>

                            <div class="mb-3">
                                <label for="end_time" class="form-label">New End Time</label>
                                <input type="time" class="form-control" id="end_time" name="end_time" required>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">Update Lecture Time</button>
                                <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
